<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store - PowerFit</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="page-center">

        <!-- Navbar (black) -->
        <nav class="navbar navbar--black">
            <a href="index.html" class="nav-brand">PowerFit</a>
            <button class="nav-toggle" id="navToggle2" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu2">
                <li><a href="index.html">Home</a></li>
                <li><a href="Store.html">Store</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="login.html">Log in</a></li>
            </ul>
        </nav>

        <main class="main-content store-page">
            <section class="store-header" aria-label="Store header">
                <h1 class="store-title">Colección PowerFit</h1>
                <p class="store-subtitle">Descubre ropa diseñada para potenciar tu rendimiento.</p>
            </section>

            <!-- Controles de Búsqueda y Filtros -->
            <section class="store-controls" aria-label="Filtros y Búsqueda">
                <div class="store-search-bar">
                    <input type="text" id="searchInput" placeholder="Buscar producto por nombre...">
                    <button class="search-btn" id="searchBtn" aria-label="Buscar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            viewBox="0 0 16 16">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                        </svg>
                    </button>
                </div>
                <div class="store-filters">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="hombre">Hombre</button>
                    <button class="filter-btn" data-filter="mujer">Mujer</button>
                </div>
            </section>

            <!-- Grid de Productos -->
            <section class="store-grid" id="productGrid" aria-label="Lista de Productos">

            </section>

            <!-- Mensaje de no encontrados -->
            <div id="noResults" class="no-results" style="display: none;">
                <p>No se encontraron productos con esa búsqueda.</p>
            </div>

        </main>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <h2>PowerFit</h2>
                <p>Rendimiento, estilo y actitud activa.</p>
            </div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="Store.html">Store</a>
                <a href="about.html">About</a>
                <a href="login.html">Log in</a>
            </div>
        </div>
        <p class="footer-copy">© 2026 PowerFit. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Toggle Menu Navbar
        document.getElementById('navToggle2').addEventListener('click', () => {
            document.getElementById('navMenu2').classList.toggle('active');
            document.getElementById('navToggle2').classList.toggle('active');
        });
    </script>
    <script src="src/store/store.js"></script>
</body>

</html>
