<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | PowerFit</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="page-center">
    <nav class="navbar navbar--black">
      <a href="#" class="nav-brand">PowerFit</a>
      <button class="nav-toggle" id="navToggle2" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="navMenu2">
        <li><a href="index.html">Home</a></li>
        <li><a href="Store.html">Store</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="login.html">Log in</a></li>
      </ul>
    </nav>

    <main class="auth-container">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" aria-selected="true">Iniciar sesión</button>
          <button class="auth-tab" data-tab="signup" aria-selected="false">Crear cuenta</button>
        </div>

        <!-- Login form -->
        <form id="loginForm" class="auth-form active" novalidate>
          <h1>Bienvenido</h1>
          <p class="auth-subtitle">Ingresa con tu cuenta</p>
          <div class="form-group">
            <label for="loginEmail">Correo electrónico</label>
            <input type="email" id="loginEmail" name="email" required placeholder="tu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" name="password" required placeholder="••••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="btn-auth">Iniciar sesión</button>
        </form>

        <!-- Signup form -->
        <form id="signupForm" class="auth-form" novalidate>
          <h1>Crear cuenta</h1>
          <p class="auth-subtitle">Regístrate en PowerFit</p>
          <div class="form-group">
            <label for="signupName">Nombre</label>
            <input type="text" id="signupName" name="name" required placeholder="Tu nombre" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="signupEmail">Correo electrónico</label>
            <input type="email" id="signupEmail" name="email" required placeholder="tu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="signupPassword">Contraseña</label>
            <input type="password" id="signupPassword" name="password" required placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6">
          </div>
          <div class="form-group">
            <label for="signupPasswordConfirm">Confirmar contraseña</label>
            <input type="password" id="signupPasswordConfirm" name="passwordConfirm" required placeholder="Repite la contraseña" autocomplete="new-password">
          </div>
          <button type="submit" class="btn-auth">Crear cuenta</button>
        </form>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <h2>PowerFit</h2>
        <p>Rendimiento, estilo y actitud activa.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="Store.html">Store</a>
        <a href="about.html">About</a>
        <a href="login.html">Log in</a>
      </div>
    </div>
    <p class="footer-copy">© 2026 PowerFit. Todos los derechos reservados.</p>
  </footer>

  <script type="module" src="/src/main.js"></script>
  <script>
    // =============================================
    // Mobile nav toggle
    // =============================================
    const navToggle = document.getElementById('navToggle2');
    const navMenu = document.getElementById('navMenu2');
    if (navToggle) {
      navToggle.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        navToggle.classList.toggle('active');
      });
    }

    // =============================================
    // Tab switching (Login ↔ Signup)
    // =============================================
    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        tabs.forEach(t => {
          if (t !== tab) t.setAttribute('aria-selected', 'false');
        });

        if (target === 'login') {
          loginForm.classList.add('active');
          signupForm.classList.remove('active');
        } else {
          signupForm.classList.add('active');
          loginForm.classList.remove('active');
        }
      });
    });

    // =============================================
    // Si ya está logueado, redirigir
    // =============================================
    (function checkExistingSession() {
      const token = localStorage.getItem('pf_token');
      const user = JSON.parse(localStorage.getItem('pf_user') || 'null');
      if (token && user) {
        if (user.role === 'ADMIN') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      }
    })();

    // =============================================
    // LOGIN — POST /api/auth/login
    // =============================================
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const submitBtn = e.target.querySelector('.btn-auth');

      if (!email || !password) {
        alert('Por favor ingresa tu email y contraseña.');
        return;
      }

      // Deshabilitar botón mientras carga
      submitBtn.disabled = true;
      submitBtn.textContent = 'Iniciando sesión...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.error || 'Error al iniciar sesión.');
          return;
        }

        // Guardar token y datos del usuario en localStorage
        localStorage.setItem('pf_token', data.token);
        localStorage.setItem('pf_user', JSON.stringify(data.user));

        // Redirigir según rol
        if (data.user.role === 'ADMIN') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }

      } catch (error) {
        console.error('Error de login:', error);
        alert('Error de conexión. Verifica que el servidor esté corriendo.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Iniciar sesión';
      }
    });

    // =============================================
    // SIGNUP — POST /api/auth/signup
    // =============================================
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupPasswordConfirm').value;
      const submitBtn = e.target.querySelector('.btn-auth');

      if (!name || !email || !password) {
        alert('Por favor completa todos los campos.');
        return;
      }

      if (password !== confirm) {
        alert('Las contraseñas no coinciden.');
        return;
      }

      if (password.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creando cuenta...';

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.error || 'Error al crear la cuenta.');
          return;
        }

        alert('¡Cuenta creada exitosamente! Ahora puedes iniciar sesión.');

        // Limpiar formulario y cambiar a tab de login
        e.target.reset();
        tabs[0].click();

      } catch (error) {
        console.error('Error de signup:', error);
        alert('Error de conexión. Verifica que el servidor esté corriendo.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
